version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_backend
    env_file:
      - ./backend/.env
    ports:
      - '8000:8000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag_frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - '5173:5173'
    depends_on:
      - backend
